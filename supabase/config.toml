# Supabase CLI configuration for Meridian LMS
# Generated by: Next.js 16 + Supabase project
# Refer to https://supabase.com/docs/reference/cli/config for full reference

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
major_version = 15

[db.pooler]
enabled = true
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[auth]
enabled = true
enable_signup = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
# Only allow @stratpoint.com domain
[auth.email]
enable_confirmations = false

# Cookie settings for Next.js SSR
[auth.sessions]
timebox = "24h"
inactivity_timeout = "12h"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
vector_port = 54328

# Storage buckets configuration
[storage]
enabled = true

[storage.buckets.supporting-docs]
public = false
file_size_limit = 5242880
allowed_mime_types = [
  "application/pdf",
  "image/jpeg",
  "image/png",
  "image/gif",
  "image/webp"
]
objects_path = "supporting-docs/*"
# Per-bucket CORS is not a supported local CLI config key (origins are
# already restricted by [api] / [auth] site_url for local dev).
